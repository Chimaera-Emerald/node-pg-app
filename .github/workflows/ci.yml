name: CI

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main, develop, release]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: node-pg-app/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: node-pg-app

      - name: Run lint
        run: npm run lint
        working-directory: node-pg-app

      - name: Run tests
        run: npm test
        working-directory: node-pg-app
